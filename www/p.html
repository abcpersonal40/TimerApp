<style>
    /* --- THEME VARIABLES --- */
    :root {
        --primary: #6366f1;       
        --primary-soft: #e0e7ff;
        --bg-body: #f1f5f9;       
        --surface: #ffffff;
        --text-main: #334155;     
        --text-sub: #94a3b8;      
        --border: #cbd5e1;
        
        --danger: #f43f5e;
        --success: #10b981;
        --warn: #f59e0b;
        --skip: #64748b;
        
        --shadow-float: 0 10px 40px -5px rgba(0,0,0,0.15);
        --shadow-card: 0 2px 4px rgba(0,0,0,0.04);
        
        --font-stack: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* GLOBAL STYLES */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
    
    /* --- KEYBOARD FIX (VERY IMPORTANT) --- */
    /* এই অংশটি কিবোর্ড ওপেন করতে সাহায্য করে */
    input, textarea, .ql-editor, .ql-editor * {
        user-select: text !important;
        -webkit-user-select: text !important;
        cursor: text;
    }

    body {
        font-family: var(--font-stack);
        background: var(--bg-body); 
        color: var(--text-main);
        min-height: 100vh; width: 100vw; margin: 0;
        overflow: auto; display: flex; flex-direction: column;
    }

    /* --- HEADER (Conflict Free) --- */
    header {
        height: 54px; background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 12px; z-index: 20; position: relative;
    }

    .header-left { 
        display: flex; align-items: center; gap: 8px; z-index: 5; flex: 1;
    }

    .view-toggle {
        width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
        background: var(--bg-body); color: var(--text-main); display: grid; place-items: center; cursor: pointer;
        flex-shrink: 0;
	transition: all 0.2s ease-in-out;
    }
    .view-toggle.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Smart Clock */
    .clock-widget {
        display: flex; flex-direction: column; align-items: center;
        line-height: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        white-space: nowrap;
    }
    .clock-widget.centered {
        position: absolute; left: 50%; transform: translateX(-50%);
        align-items: center;
    }
    .clock-widget.mini-left {
        position: relative; transform: none; 
        align-items: flex-start; cursor: pointer;
        background: var(--primary-soft); padding: 4px 8px; border-radius: 6px;
    }
    .clock-widget.mini-left .cw-time { color: var(--primary); font-size: 0.8rem; }
    .clock-widget.mini-left .cw-date { display: none; } 
    .clock-widget.mini-left::after { content: 'Return'; font-size: 0.55rem; color: var(--primary); font-weight: 700; }

    .cw-time { font-size: 0.95rem; font-weight: 800; color: var(--text-main); }
    .cw-date { font-size: 0.65rem; font-weight: 600; color: var(--text-sub); margin-top: 2px;}

    /* Center Title */
    .center-title {
        position: absolute; left: 0; right: 0; text-align: center;
        font-size: 1rem; font-weight: 800; color: var(--text-main);
        opacity: 0; transition: opacity 0.3s; pointer-events: none;
        z-index: 1; padding: 0 60px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .center-title.visible { opacity: 1; }

    /* Nav Buttons */
    .nav-group { display: flex; gap: 2px; align-items: center; z-index: 5; flex-shrink: 0; }
    .nav-btn { 
        width: 30px; height: 30px; border-radius: 6px;
        background: transparent; border: none; 
        font-size: 1.2rem; color:var(--text-main); cursor:pointer; 
        display: grid; place-items: center;
    }
    .nav-btn:active { background: var(--bg-body); }

    /* --- CALENDAR --- */
    main { flex: 1; padding: 0; overflow: hidden; display:flex; flex-direction:column; }
    
    .cal-grid { 
        display: grid; 
        grid-template-columns: repeat(7, 1fr); 
        grid-auto-rows: minmax(70px, auto); 
        gap: 1px;
        overflow-y: auto; 
        height: 100%; 
        align-content: start;
        background: var(--border); 
        padding: 1px;
    }
    
    .day-head {
        background: var(--surface); position: sticky; top: 0; z-index: 10;
        text-align: center; font-size: 0.55rem; font-weight: 800; color: var(--text-sub);
        padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    
    .day {
        background: var(--surface); padding: 4px;
        display: flex; flex-direction: column; gap: 3px; cursor: pointer;
        position: relative;
    }
    .day.today { background: #f8fafc; }
    .day.today .date-num { background: var(--primary); color: #fff; }
    
    .date-num { 
        font-size: 0.7rem; font-weight: 700; color: var(--text-sub); 
        margin-left: auto; width: 20px; height: 20px; 
        display: grid; place-items: center; border-radius: 5px;
    }
    
    /* Chips & Indicators */
    .pin-chip {
        font-size: 0.6rem; font-weight: 600; padding: 2px 4px;
        border-radius: 3px; background: var(--primary-soft); color: var(--primary);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        border-left: 2px solid var(--primary); display: block;
    }
    .pin-chip.is-late { background: #fee2e2; color: var(--danger); border-color: var(--danger); }
    
    .indicator-row { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; margin-top: auto; }
    .idx-pill { font-size: 0.55rem; font-weight: 700; padding: 1px 4px; border-radius: 8px; }
    .idx-p { background: #e0e7ff; color: #4f46e5; }
    .idx-t { background: #dcfce7; color: #15803d; }
    .idx-n { background: #fef3c7; color: #b45309; }
    
    .mini-dots { display: flex; gap: 2px; justify-content: flex-end; }
    .m-dot { width: 4px; height: 4px; border-radius: 50%; }

    /* --- PREMIUM PANEL --- */
    .overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.15); backdrop-filter: blur(4px);
        opacity: 0; pointer-events: none; transition: 0.3s; z-index: 50;
    }
    .overlay.active { opacity: 1; pointer-events: auto; }
    
    .sheet {
        position: absolute; bottom: 0; left: 0; right: 0; height: 75vh; 
        background: var(--surface); border-radius: 20px 20px 0 0; 
        display: flex; flex-direction: column;
        transform: translateY(110%); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), height 0.3s;
        box-shadow: var(--shadow-float); overflow: hidden;
    }
    .sheet.full-mode { height: 95vh; }
    .overlay.active .sheet { transform: translateY(0); }

    .sh-head { 
        padding: 10px 16px; border-bottom: 1px solid var(--border); 
        display: flex; justify-content: space-between; align-items: center; 
        background: var(--surface); z-index: 5;
    }
    
    .color-picker { display: flex; gap: 8px; }
    .cp-dot { 
        width: 18px; height: 18px; border-radius: 50%; cursor: pointer; 
        border: 2px solid #fff; box-shadow: 0 0 0 1px #ddd;
    }

    .tabs { display: flex; padding: 0 16px; gap: 16px; border-bottom: 1px solid var(--border); margin-top: 5px;}
    .tab { 
        padding: 12px 0; border: none; background: transparent; 
        color: var(--text-sub); font-weight: 700; font-size: 0.85rem; 
        cursor: pointer; position: relative; 
    }
    .tab.active { color: var(--primary); }
    .tab.active::after { 
        content:''; position: absolute; bottom: -1px; left: 0; right: 0; 
        height: 3px; background: var(--primary); border-radius: 3px; 
    }

    .filter-bar {
        display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; border-bottom: 1px solid var(--border);
    }
    .f-chip {
        padding: 4px 10px; border-radius: 20px; background: var(--bg-body); 
        color: var(--text-sub); font-size: 0.7rem; font-weight: 700; border: 1px solid transparent; cursor: pointer;
    }
    .f-chip.active { background: var(--text-main); color: #fff; }

    .sh-body { flex: 1; overflow-y: auto; padding: 10px 16px 80px 16px; }

    /* Cards */
    .card { 
        background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 10px; 
        border: 1px solid var(--border); box-shadow: var(--shadow-card);
        display: flex; gap: 10px; align-items: flex-start;
    }
    .card-check {
        width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
        flex-shrink: 0; margin-top: 2px; cursor: pointer; display: grid; place-items: center;
    }
    .card.done .card-check { background: var(--success); border-color: var(--success); }
    .card.skip .card-check { border-color: var(--skip); background: var(--bg-body); }
    
    .card-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
    .card-txt { 
        font-size: 0.95rem; font-weight: 600; color: var(--text-main); 
        white-space: pre-wrap; word-break: break-word; line-height: 1.4;
    }
    .card.done .card-txt { text-decoration: line-through; opacity: 0.5; }
    .card-footer { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; color: var(--text-sub); }
    .badge-time { display: flex; align-items: center; gap: 3px; background: var(--bg-body); padding: 2px 6px; border-radius: 4px; }
    .badge-timer { color: var(--primary); }

    /* --- COMPACT & PRETTY PICKERS --- */
    .picker-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999 !important;
        display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px);
    }
    .picker-overlay.open { display: flex; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes popIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    
    .tp-card {
        background: #fff; width: 260px; padding: 15px; border-radius: 18px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }
    .tp-header { text-align: center; font-weight: 800; color: var(--text-main); margin-bottom: 10px; font-size: 1rem; }
    
    .tp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; height: 160px; }
    .tp-col { overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 2px; }
    .tp-col::-webkit-scrollbar { width: 3px; }
    .tp-col::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    
    .tp-btn {
        padding: 6px; border-radius: 6px; border: 1px solid transparent; background: #f8fafc;
        font-weight: 600; font-size: 0.85rem; cursor: pointer; text-align: center; transition: 0.1s;
    }
    .tp-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 5px rgba(99, 102, 241, 0.3); }
    
    .tp-actions { margin-top: 12px; display: flex; gap: 8px; }
    .tp-act-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
    .tp-save { background: var(--primary); color: white; }
    .tp-close { background: #e2e8f0; color: var(--text-main); }

    /* --- CUSTOM DELETE CONFIRMATION --- */
    .confirm-card {
        background: #fff; width: 240px; padding: 20px; border-radius: 16px;
        text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }
    .conf-title { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 5px; }
    .conf-sub { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 15px; }
    .conf-btns { display: flex; gap: 10px; }
    .conf-btn { 
        flex: 1; padding: 10px; border-radius: 8px; border: none; 
        font-weight: 700; cursor: pointer; font-size: 0.9rem; 
    }
    .conf-yes { background: var(--danger); color: white; }
    .conf-no { background: #f1f5f9; color: var(--text-main); }


    /* --- EDITOR & DOCS --- */
    .edit-row { 
        background: #fff; border: 1px solid var(--border); padding: 10px; 
        border-radius: 10px; margin-bottom: 10px; display:flex; gap:8px; align-items:center;
    }
    .btn-time-trig {
        background: var(--bg-body); border: 1px solid var(--border); padding: 8px 12px;
        border-radius: 8px; font-weight: 700; color: var(--primary); cursor: pointer;
        min-width: 80px; text-align: center;
    }
    .inp-flat { 
        border: 1px solid #eee; background: var(--bg-body); padding: 8px; 
        border-radius: 6px; flex: 1; font-family: inherit; font-size: 0.95rem;
    }

    /* --- QUILL FIXED STYLES (KEYBOARD + TOOLBAR) --- */
    .editor-container { 
        background: #fff; 
        border: 1px solid var(--border); 
        border-radius: 10px; 
        overflow: hidden; 
        display: flex; 
        flex-direction: column; 
        height: 350px; 
        position: relative;
    }

    /* Toolbar Specific Fixes */



/* Toolbar Specific Fixes */
.ql-toolbar.ql-snow {
    border: none !important; 
    border-bottom: 1px solid var(--border) !important;
    background: var(--bg-body); 
    flex-shrink: 0; 
    width: 100%;    
    z-index: 5;    
    display: flex !important;   /* Block এর বদলে Flex */
    flex-wrap: wrap;            /* বাটনগুলো নিচে নিচে নামবে */
    padding: 5px !important;
    gap: 5px;                   /* বাটনের মাঝখানে ফাঁকা */
}

/* ছোট স্ক্রিনে বাটনগুলো সুন্দর দেখানোর জন্য */
.ql-snow .ql-picker-label { padding-left: 4px; }





    /* Editor Area Fixes */
    .ql-container.ql-snow {
        border: none !important; 
        font-family: var(--font-stack) !important; 
        font-size: 1rem; 
        flex: 1;        
        overflow-y: hidden; 
    }
    
    .ql-editor { 
        padding: 15px; 
        color: var(--text-main); 
        line-height: 1.6;
        height: 100%;
        overflow-y: auto;
    }

    /* Fix Icons Visibility */
    .ql-snow .ql-stroke { stroke: var(--text-main) !important; }
    .ql-snow .ql-fill { fill: var(--text-main) !important; }
    .ql-snow .ql-picker { color: var(--text-main) !important; }
    
    .ql-editor img { max-width: 100%; height: auto; border-radius: 6px; }


    /* Stickers */
    .sticker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .sticker { 
        padding: 15px; border-radius: 10px; font-size: 0.9rem; 
        box-shadow: var(--shadow-card); position: relative; word-break: break-word; 
        max-height: 200px; overflow-y: auto; background: #fff;
    }
    .sticker img { max-width: 100%; height: auto; border-radius: 4px; display: block; margin: 5px 0; }
    .sticker::-webkit-scrollbar { width: 4px; }
    .sticker::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

    .add-fab {
        position: absolute; bottom: 20px; right: 20px; width: 48px; height: 48px;
        background: var(--text-main); color: white; border-radius: 50%; border: none;
        font-size: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; z-index: 10;
    }




/* --- EDITOR FULL PAGE FIX --- */
.sheet.full-mode .sh-body {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.sheet.full-mode .editor-container {
    flex: 1; /* ফুল স্ক্রিনে এডিটর পুরো জায়গা নেবে */
    height: auto !important;
    min-height: 0;
}

/* Sticker এর উপর বাটনগুলোর স্টাইল */
.sticker-actions {
    position: absolute;
    top: 5px;
    right: 5px;
    display: flex;
    gap: 5px;
    background: rgba(255,255,255,0.9);
    padding: 3px;
    border-radius: 6px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.st-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    width: 24px;
    height: 24px;
    display: grid;
    place-items: center;
    border-radius: 4px;
    color: var(--text-main);
}
.st-btn:hover { background: #f1f5f9; }
.st-btn.del { color: var(--danger); }





/* --- MODE 3: TIMELINE STRIP --- */
.timeline-strip {
    display: none; /* ডিফল্টভাবে লুকানো */
    overflow-x: auto;
    white-space: nowrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
    gap: 8px;
    flex-shrink: 0;
    scrollbar-width: none; /* Firefox hide scroll */
}
.timeline-strip::-webkit-scrollbar { display: none; } /* Chrome hide scroll */

.tl-item {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 12px;
    border-radius: 8px;
    background: var(--bg-body);
    color: var(--text-sub);
    cursor: pointer;
    min-width: 50px;
    border: 1px solid transparent;
    transition: 0.2s;
}
.tl-item.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 4px 10px -2px rgba(99, 102, 241, 0.4);
}
.tl-day { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
.tl-date { font-size: 1.1rem; font-weight: 800; }
.tl-dot { width: 4px; height: 4px; background: currentColor; border-radius: 50%; margin-top: 3px; opacity: 0; }
.tl-item.has-data .tl-dot { opacity: 0.8; }


/* --- MODE 3: SPLIT VIEW LAYOUT OVERRIDES --- */
/* --- MODE 3: SPLIT VIEW LAYOUT --- */
/* --- MODE 3: SPLIT VIEW FIX (NO GAP) --- */
/* ৩য় মোডে মেইন কন্টেইনারের ফ্লেক্স বন্ধ করা */
body.mode-split main {
    flex: none !important; 
    height: auto !important;
}

/* ৩য় মোডে প্যানেল (Overlay) পুরো নিচের জায়গা দখল করবে */
body.mode-split .overlay {
    position: relative !important;
    inset: auto !important;
    background: transparent !important;
    backdrop-filter: none !important;
    opacity: 1 !important;
    pointer-events: auto !important;
    display: flex !important;
    flex: 1; /* এটি এখন বডির বাকি সবটুকু জায়গা নেবে */
    z-index: 1;
}

body.mode-split .sheet {
    position: relative !important;
    transform: none !important; 
    height: 100% !important;
    width: 100%;
    border-radius: 0;
    box-shadow: none;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

/* ৩য় মোডে অতিরিক্ত প্যাডিং কমানো */
body.mode-split .sh-body {
    padding: 10px 16px 20px 16px !important;
}

/* টাইমলাইন স্ট্রিপ ফিক্স */
.timeline-strip {
    display: none;
    overflow-x: auto;
    background: #fff;
    padding: 10px;
    gap: 8px;
    height: 85px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
}

/* ইন্ডিকেটর স্টাইল (টাইমলাইনের তারিখের নিচে) */
.tl-indicators {
    display: flex;
    gap: 2px;
    margin-top: 4px;
    height: 12px;
}
.tl-ind {
    font-size: 0.55rem;
    font-weight: 800;
    padding: 0 3px;
    border-radius: 3px;
}
.tl-p { background: #e0e7ff; color: #4f46e5; }
.tl-t { background: #dcfce7; color: #15803d; }
.tl-n { background: #fef3c7; color: #b45309; }


/* --- MODE 3: INDEPENDENT SCROLLING FIX --- */













/* --- MODE 3: FULL SCROLL FIX --- */
body.mode-split {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

body.mode-split main {
    flex-shrink: 0;
    height: auto !important;
}

body.mode-split .overlay {
    position: relative !important;
    flex: 1; 
    display: flex !important;
    flex-direction: column;
    overflow: hidden; /* বাইরের অংশ যাতে স্ক্রল না হয় */
    min-height: 0;
}

body.mode-split .sheet {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100% !important;
    transform: none !important;
    border-radius: 0;
    background: var(--surface);
}

body.mode-split .sh-body {
    flex: 1;
    overflow-y: auto !important;
    /* নিচের বাটনের জন্য পর্যাপ্ত জায়গা (১০০-১২০ পিক্সেল) */
    padding: 10px 16px 120px 16px !important;

<script>
    


window.Quill = Quill;



let db = {}; // ডাটাবেস লোড হওয়ার আগ পর্যন্ত খালি থাকবে
let idb; // IndexedDB ইনস্ট্যান্স
const DB_NAME = 'ProPlannerDB';
let viewDate = new Date();

    let selKey = null;
    let curTab = 'pin';
    let taskFilter = 'all';
    let editingNoteIdx = null; // কোন নোট এডিট হচ্ছে তা মনে রাখার জন্য
    let isEdit = false;
let viewMode = parseInt(localStorage.getItem('viewMode') || 0); 
// 0 = Normal, 1 = Compact, 2 = Split/Timeline

        buildDatePicker();

            updateClock();

function autoResizeAll() {
    setTimeout(() => {
        document.querySelectorAll('textarea.inp-flat, textarea.proj-desc-inp').forEach(t => {
            t.style.height = 'auto';
            t.style.height = t.scrollHeight + 'px';
        });
    }, 50);
}



// --- PROJECT SECTION PLACEMENT LOGIC ---
function placeProjectSection() {
    const projSec = document.querySelector('.project-section'); // প্রজেক্ট সেকশন ধরা
    const main = document.querySelector('main'); // মেইন ট্যাগ
    const sheet = document.getElementById('sheetCard'); // শিট/প্যানেল

    if (viewMode === 2) {
        // Mode 3: প্রজেক্ট সেকশন শিট (Sheet) এর ভেতরে নিয়ে যাও
        sheet.appendChild(projSec);
    } else {
        // Normal Mode: প্রজেক্ট সেকশন মেইন (Main) এর ভেতরে ফেরত আনো
        main.appendChild(projSec);
    }
}

function toggleViewMode() {
    // 0 -> 1 -> 2 -> 0 এভাবে সাইকেল হবে
    viewMode = (viewMode + 1) % 3;
    localStorage.setItem('viewMode', viewMode);
    
    applyViewModeClass();
    renderCal();
    updateViewToggle();
    
    // --> নতুন লাইন যোগ করুন:
    placeProjectSection(); 
}



function applyViewModeClass() {
    if(viewMode === 2) {
        document.body.classList.add('mode-split');
        const todayKey = new Date().toISOString().split('T')[0];
        if(!selKey) selKey = todayKey;
        
        // টাইমলাইন এবং প্যানেল সাথে সাথে দেখানোর জন্য
        renderCal(); 
        renderSheet(); 
    } else {
        document.body.classList.remove('mode-split');
        // অন্য মোডে ফিরে গেলে প্যানেল লুকিয়ে ফেলা (পপআপ ছাড়া আসবে না)
        document.getElementById('overlay').classList.remove('active');
        renderCal();
    }
}

function renderTimeline(y, m) {
    const box = document.getElementById('timelineBox');
    box.innerHTML = '';
    const daysStr = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const daysInMonth = new Date(y, m+1, 0).getDate();
    
    for(let i=1; i<=daysInMonth; i++) {
        const dObj = new Date(y, m, i);
        const key = dObj.toISOString().split('T')[0];
        const dayData = db[key] || {pins:[], tasks:[], notes:[]};
        
        const pCount = dayData.pins.length;
        const tCount = dayData.tasks.filter(t => t.status !== 'done').length;
        const nCount = dayData.notes.length;

        const el = document.createElement('div');
        el.className = `tl-item ${key === selKey ? 'active' : ''}`;
        
        // ইন্ডিকেটর বক্স
        let indicatorsHTML = `<div class="tl-indicators">`;
        if(pCount > 0) indicatorsHTML += `<span class="tl-ind tl-p">${pCount}p</span>`;
        if(tCount > 0) indicatorsHTML += `<span class="tl-ind tl-t">${tCount}t</span>`;
        if(nCount > 0) indicatorsHTML += `<span class="tl-ind tl-n">${nCount}d</span>`;
        indicatorsHTML += `</div>`;

        el.innerHTML = `
            <div class="tl-day">${daysStr[dObj.getDay()]}</div>
            <div class="tl-date">${i}</div>
            ${indicatorsHTML}
        `;

        el.onclick = () => {
            selKey = key;
            renderTimeline(y, m);
            renderSheet(); // তারিখ বদলালে নিচের লিস্ট বদলাবে

    const body = document.getElementById('sheetBody');
    if(body) body.scrollTop = 0;


        };
        
        box.appendChild(el);
        if(key === selKey) {
            setTimeout(() => el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}), 50);
        }
    }
}
// আপনার init ফাংশনটি এমন হওয়া উচিত

function updateViewToggle() {
    const btn = document.getElementById('viewTog');
    
    // আইকন সব মোডের জন্য এক (icon-layer)
    btn.innerHTML = `<svg style="width:18px;height:18px;fill:currentColor"><use href="#icon-layer"/></svg>`;

    // মোড অনুযায়ী রঙ পরিবর্তন
    if (viewMode === 0) {
        // ১. নরমাল মোড: ব্যাকগ্রাউন্ড ব্লু, আইকন হোয়াইট
        btn.style.backgroundColor = "var(--primary)";
        btn.style.color = "#ffffff";
        btn.style.borderColor = "var(--primary)";
    } else if (viewMode === 1) {
        // ২. কম্প্যাক্ট মোড: ব্যাকগ্রাউন্ড হোয়াইট, আইকন ব্লু
        btn.style.backgroundColor = "#ffffff";
        btn.style.color = "#2563eb"; // নীল রঙ
        btn.style.borderColor = "#2563eb";
    } else if (viewMode === 2) {
        // ৩. স্প্লিট মোড: ব্যাকগ্রাউন্ড হোয়াইট, আইকন ইয়োলো/গোল্ডেন
        btn.style.backgroundColor = "#ffffff";
        btn.style.color = "#f59e0b"; // হলুদ/কমলা রঙ
        btn.style.borderColor = "#f59e0b";
    }
}


    function updateClock() {
        const n = new Date();
        document.getElementById('headTime').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        document.getElementById('headDate').innerText = n.toLocaleDateString([], {month:'short', day:'numeric'});
    }

    // --- NAVIGATION ---
    function updateHeaderState() {
        const today = new Date();
        const isCurrent = viewDate.getMonth() === today.getMonth() && viewDate.getFullYear() === today.getFullYear();
        
        const clock = document.getElementById('smartClock');
        const title = document.getElementById('centerTitle');
        
        if(isCurrent) {
            clock.className = 'clock-widget centered';
            title.classList.remove('visible');
        } else {
            clock.className = 'clock-widget mini-left';
            title.innerText = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            title.classList.add('visible');
        }
    }

    function goToToday() { viewDate = new Date(); renderCal(); }



    function getRelTime(isoDate, timeStr) {
        if(!timeStr) return null;
        const target = new Date(`${isoDate}T${timeStr}`);
        const now = new Date();
        const diff = target - now;
        const mins = Math.ceil(diff / 60000);
        
        if(diff < -60000) return { txt: "Late", class: "late" };
        if(diff <= 60000 && diff > -60000) return { txt: "Now", class: "" };
        if(mins < 60) return { txt: `in ${mins}m`, class: "" };
        const h = Math.floor(mins/60);
        const m = mins%60;
        return { txt: `in ${h}h ${m>0?m+'m':''}`, class: "" };
    }

    // --- CALENDAR RENDER ---
function renderCal() {
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    updateHeaderState(); 

    const grid = document.getElementById('grid');
    const timelineBox = document.getElementById('timelineBox');

    // --- মোড অনুযায়ী গ্রিড এবং টাইমলাইন লুকানো বা দেখানো ---
    if (viewMode === 2) {
        grid.style.display = 'none';         // ক্যালেন্ডার বন্ধ
        timelineBox.style.display = 'flex';  // তারিখের লাইন চালু
        renderTimeline(y, m);               // তারিখের লাইন রেন্ডার
        return; 
    } else {
        grid.style.display = 'grid';         // ক্যালেন্ডার চালু
        timelineBox.style.display = 'none';  // তারিখের লাইন বন্ধ
    }

    // --- মোড ০ এবং ১ এর জন্য ক্যালেন্ডার রেন্ডারিং (আপনার আগের নির্ভুল কোড) ---
    grid.innerHTML = '';
    ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(d => {
        const h = document.createElement('div'); h.className='day-head'; h.innerText=d; grid.appendChild(h);
    });

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const todayKey = new Date().toISOString().split('T')[0];

    for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

    for(let i=1; i<=daysInMonth; i++) {
        const dObj = new Date(y, m, i);
        const key = dObj.toISOString().split('T')[0];
        if(!db[key]) db[key] = {bg:'#ffffff', pins:[], tasks:[], notes:[]};
        const d = db[key];
        
        const cell = document.createElement('div');
        cell.className = 'day';
        if(key === todayKey) cell.classList.add('today');
        cell.style.background = d.bg !== '#ffffff' ? d.bg : '';
        cell.onclick = () => openSheet(key, dObj);

        let html = `<div class="date-num">${i}</div>`;
        
        if(viewMode === 1) { // Compact Mode
            html += `<div class="indicator-row">`;
            if(d.pins.length) html += `<div class="idx-pill idx-p">${d.pins.length}p</div>`;
            const activeT = d.tasks.filter(t=>t.status!=='done'&&t.status!=='skip').length;
            if(activeT) html += `<div class="idx-pill idx-t">${activeT}t</div>`;
            if(d.notes.length) html += `<div class="idx-pill idx-n">${d.notes.length}d</div>`;
            html += `</div>`;
        } else { // Normal Mode
            d.pins.forEach(pin => {
                let displayText = pin.txt;
                let chipClass = '';
                if(pin.time) {
                    const rel = getRelTime(key, pin.time);
                    displayText = `<b>${rel.txt}</b> ${pin.txt}`;
                    if(rel && rel.class === 'late') chipClass = 'is-late';
                }
                html += `<div class="pin-chip ${chipClass}">${displayText}</div>`;
            });
            const activeT = d.tasks.filter(t => t.status !== 'done' && t.status !== 'skip').length;
            if(activeT || d.notes.length) {
                html += `<div class="mini-dots">`;
                if(activeT) html += `<div class="m-dot" style="background:var(--success)"></div>`;
                if(d.notes.length) html += `<div class="m-dot" style="background:var(--warn)"></div>`;
                html += `</div>`;
            }
        }
        cell.innerHTML = html;
        grid.appendChild(cell);
    }
}




// ১. টাইমলাইন রেন্ডার ফাংশন (কালার সাপোর্ট সহ)
function renderTimeline(y, m) {
    const box = document.getElementById('timelineBox');
    if (!box) return;
    box.innerHTML = '';
    
    const daysStr = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const daysInMonth = new Date(y, m+1, 0).getDate();
    
    const todayKey = new Date().toISOString().split('T')[0];
    if(!selKey) selKey = todayKey;

    for(let i=1; i<=daysInMonth; i++) {
        const dObj = new Date(y, m, i);
        const key = dObj.toISOString().split('T')[0];
        const dayData = db[key] || {bg:'#ffffff', pins:[], tasks:[], notes:[]};
        
        const el = document.createElement('div');

        if (key !== selKey && dayData.bg && dayData.bg !== '#ffffff') {
            el.style.background = dayData.bg;
            el.style.borderColor = "rgba(0,0,0,0.05)";
        }

        const pCount = dayData.pins.length;
        const tCount = dayData.tasks.filter(t => t.status !== 'done').length;
        const nCount = dayData.notes.length;

        let indicatorsHTML = `<div class="tl-indicators">`;
        if(pCount > 0) indicatorsHTML += `<span class="tl-ind tl-p">${pCount}p</span>`;
        if(tCount > 0) indicatorsHTML += `<span class="tl-ind tl-t">${tCount}t</span>`;
        if(nCount > 0) indicatorsHTML += `<span class="tl-ind tl-n">${nCount}d</span>`;
        indicatorsHTML += `</div>`;

        el.innerHTML = `
            <div class="tl-day">${daysStr[dObj.getDay()]}</div>
            <div class="tl-date">${i}</div>
            ${indicatorsHTML}
        `;

        el.onclick = () => {
            selKey = key;
            renderTimeline(y, m);
            renderSheet();
        };
        
        box.appendChild(el);
        if(key === selKey) {
            setTimeout(() => el.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}), 50);
        }
    }

// saveNote এর ভেতরে
function saveNote() {
    if(!quill) return;
    const txt = quill.root.innerHTML;
    const plainTxt = quill.getText().trim();
    const hasContent = plainTxt.length > 0 || txt.includes('<img') || txt.includes('<iframe') || txt.includes('katex');

    if(!hasContent) {
        window.parent.showAlert("Empty Note", "Please write something or add media before saving!");
        return;
    }

    if(editingNoteIdx !== null) {
        // আপডেট মোড
        db[selKey].notes[editingNoteIdx].html = txt;
    } else {
        // নতুন নোট মোড
        db[selKey].notes.push({ 
            html: txt, 
            bg: getRandomColor() 
        });
    }

    saveDB();       
    cancelEditNote(); 
}

function init() {
        const request = indexedDB.open(DB_NAME, 1);

        request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains('data')) {
                database.createObjectStore('data');
            }
        };

        request.onsuccess = (e) => {
            idb = e.target.result;
            const tx = idb.transaction(['data'], 'readonly');
            const store = tx.objectStore('data');
            
            store.get('mainStore').onsuccess = (ev) => {
                db = ev.target.result || {};
                
                // 🚀 PRIORITY 1: UI Setup & Fast Rendering
                applyViewModeClass(); 
                updateViewToggle();
                placeProjectSection(); 
                initProjectState(); 
                
                // 🔥 PRIORITY 2: Render Projects Immediately (সবচেয়ে আগে প্রজেক্ট দেখাবে)
                if (typeof initProjects === 'function') {
                    initProjects();
                }

                // 🚀 PRIORITY 3: Open Today's Sheet (যদি Mode 3 তে থাকে)
                if(viewMode === 2) {
                    const todayKey = new Date().toISOString().split('T')[0];
                    selKey = todayKey;
                    renderSheet(); // শুধু আজকের ডেটা রেন্ডার হবে
                }

                // ⏳ PRIORITY 4: Deferred Loading (ভারী জিনিসগুলো 50ms পরে হবে)
                setTimeout(() => {
                    renderCal(); // পুরো ক্যালেন্ডার রেন্ডার হবে
                    buildTimePicker();
                    buildDatePicker();
                    updateClock();
                    setInterval(updateClock, 60000);
                }, 50); // 50ms গ্যাপ দিলে ব্রাউজার UI পেইন্ট করার সময় পাবে
            };
        };

        request.onerror = (e) => {
            console.error("DB Error:", e);
            startApp();
        };
    }













    function loadDataAndRender() {
        const tx = idb.transaction(['data'], 'readonly');
        const store = tx.objectStore('data');
        const req = store.get('mainStore');

        req.onsuccess = () => {
            // যদি আগের ডেটা থাকে তা db তে লোড হবে, না থাকলে খালি অবজেক্ট
            db = req.result || {};
            startApp();
        };
    }





function startApp() {
        applyViewModeClass();
        updateViewToggle();
        
        // 🚀 Priority: Render Projects first
        if (typeof initProjects === 'function') {
            initProjects();
        }

        if(viewMode === 2) {
            const todayKey = new Date().toISOString().split('T')[0];
            selKey = todayKey;
            renderSheet(); 
        }

        // ⏳ Deferred Tasks
        setTimeout(() => {
            renderCal();
            buildTimePicker();
            buildDatePicker();
            updateClock();
            setInterval(() => {
                updateClock();
                const today = new Date();
                if(viewDate.getMonth() === today.getMonth() && viewDate.getFullYear() === today.getFullYear()) {
                    renderCal();
                }
                if(selKey && !isEdit) renderSheet(); 
            }, 60000); 
        }, 50);
    }

                    View: ${isDocCardView ? 'List' : 'Grid'}
                </button>
            </div>` : ''}
        </div>`;
    
    box.innerHTML = controlsHTML;
    
    let pinnedList =[];
    let regularGroups = {};
    const type = curMasterTab === 'note' ? 'notes' : (curMasterTab + 's');

    Object.keys(db).forEach(key => {
        if (key === 'mainStore') return;
        const source = db[key];
        if (!source || !source[type]) return;

        source[type].forEach((item, index) => {
            let matchesFilter = true;
            if (curMasterTab === 'task' && masterTaskFilter !== 'all') {
                const status = item.status || 'pending';
                if (masterTaskFilter !== status) matchesFilter = false;
            }

            let matchesSearch = true;
            if (masterSearchQuery) {
                const content = (item.txt || item.html || '').toLowerCase();
                const timeStr = (item.time || '').toLowerCase();
                if (!content.includes(masterSearchQuery) && !timeStr.includes(masterSearchQuery) && !key.includes(masterSearchQuery)) {
                    matchesSearch = false;
                }
            }

            if (matchesFilter && matchesSearch) {
                const itemData = { ...item, parentKey: key, realIdx: index };
                if (item.isPinned) pinnedList.push(itemData);
                else {
                    if (!regularGroups[key]) regularGroups[key] =[];
                    regularGroups[key].push(itemData);
                }
            }
        });

    const containerClass = (curMasterTab === 'note' && !isDocCardView) ? 'sticker-grid' : 'doc-card-mode';

        pinnedList.forEach(item => container.appendChild(createMasterCard(item, item.parentKey, item.realIdx)));
        pinSection.appendChild(container);
        box.appendChild(pinSection);
    }

    // ২. গ্রুপড সেকশন (তারিখ অনুযায়ী)
    const sortedKeys = Object.keys(regularGroups).sort((a,b) => b.localeCompare(a));
    sortedKeys.forEach(dateKey => {
        const section = document.createElement('div');
        section.style.padding = "0 16px";

        regularGroups[dateKey].forEach(item => container.appendChild(createMasterCard(item, dateKey, item.realIdx)));
        section.appendChild(container);
        box.appendChild(section);
    });

    autoResizeAll();
}

// ৬. নির্ভুল IndexedDB সেভ ফাংশনসমূহ (Precision Logic)
function triggerDBSave() {
    saveDB(); // আপনার গ্লোবাল IndexedDB সেভ ফাংশন কল করা
}

function updateMasterItem(key, type, idx, field, val) {
    if (!db[key] || !db[key][type] || !db[key][type][idx]) return;
    db[key][type][idx][field] = val;
    db[key][type][idx].updatedAt = new Date().toISOString();
    triggerDBSave();
    renderMasterContent();
}

function toggleMasterTask(key, idx) {
    const item = db[key].tasks[idx];
    item.status = (item.status === 'done') ? 'pending' : 'done';
    item.updatedAt = new Date().toISOString();
    triggerDBSave();
    renderMasterContent();
}

function skipMasterTask(key, idx) {
    const item = db[key].tasks[idx];
    item.status = (item.status === 'skip') ? 'pending' : 'skip';
    item.updatedAt = new Date().toISOString();
    triggerDBSave();
    renderMasterContent();
}

function toggleMasterPin(key, type, idx) {
    if (!db[key] || !db[key][type] || !db[key][type][idx]) return;
    db[key][type][idx].isPinned = !db[key][type][idx].isPinned;
    db[key][type][idx].updatedAt = new Date().toISOString();
    triggerDBSave();
    renderMasterContent();
}












// ৭. নির্ভুল টাইম পিকার ও এডিটর

function cancelMasterNoteEdit() { 
    isMasterEditNote = false; 
    
    // ক্যানসেল করলে কন্টেইনার স্টাইল আগের মতো করে দেওয়া
    const box = document.getElementById('masterContent');
    box.style.display = 'block';
    box.style.padding = '15px';
    
    renderMasterContent(); 
}






function saveMasterNote() {
    const html = quill.root.innerHTML;
    const now = new Date().toISOString();
    if (!db[masterEditingKey]) db[masterEditingKey] = { bg:'#ffffff', pins:[], tasks:[], notes:[] };
    
    if (masterEditingIdx !== null) {
        db[masterEditingKey].notes[masterEditingIdx].html = html;
        db[masterEditingKey].notes[masterEditingIdx].updatedAt = now;
    } else {
        db[masterEditingKey].notes.unshift({ 
            html, bg: getRandomColor(), createdAt: now, isPinned: false 
        });
    }
    triggerDBSave();
    cancelMasterNoteEdit();
}


function addGeneralItem() {
    const now = new Date().toISOString();
    if (!db['general']) db['general'] = { bg:'#ffffff', pins: [], tasks: [], notes: [] };
    if (curMasterTab === 'task') {
        db['general'].tasks.unshift({ txt: '', status: 'pending', createdAt: now, isPinned: false });
        triggerDBSave(); 
        renderMasterContent();
    } else if (curMasterTab === 'note') {
        openMasterNoteEditor('general', null);
    }
}

let curProjIdx = null;
let curProjTab = 'task';
let projTaskFilter = 'all'; // Default Filter
let isProjEdit = false;
let editingProjDocIdx = null;
let isProjDocCardView = false; // Grid/List Toggle State
let projDocSearchQuery = '';   // Search State




// 1. Initialize Projects Storage
function initProjects() {
    if (!db.projects) {
        db.projects = []; 
    }
    // পুরোনো ডাটা মাইগ্রেশন (Description field না থাকলে এরর এড়াতে)
    db.projects.forEach(p => {
        p.tasks.forEach(t => {
            if(!t.desc) t.desc = "";
            if(!t.status) t.status = "pending";
        });
        p.docs.forEach(d => {
            if(d.isPinned === undefined) d.isPinned = false;
        });
    });
    renderProjects();
}
// Auto init
setTimeout(initProjects, 500); 

// 2. Render 3D Cards inside Main Page
function renderProjects() {
    const list = document.getElementById('projectList');
    if(!list) return;
    list.innerHTML = '';
    
    if(!db.projects.length) {
        list.innerHTML = `<div style="font-size:0.8rem; color:var(--text-sub); padding:10px;">No projects. Tap + NEW</div>`;
        return;
    }

    db.projects.forEach((p, i) => {
        const pending = p.tasks.filter(t => t.status !== 'done' && t.status !== 'skip').length;
        const total = p.tasks.length;
        const percent = total === 0 ? 0 : Math.round(((total - pending) / total) * 100);
        
        const card = document.createElement('div');
        card.className = 'proj-3d-card';
        card.onclick = () => openProjectPanel(i);
        
        card.innerHTML = `
            <div class="p-card-title">${p.title}</div>
            <div class="p-card-count" style="top:auto; bottom:10px; right:10px; background:${percent===100?'#dcfce7':'#e0e7ff'}; color:${percent===100?'#15803d':'#4f46e5'}">
                ${percent}% Done
            </div>
            <div class="p-card-count">${pending} Active</div>
        `;
        list.appendChild(card);
    });
}

// 3. Create New Project
function createNewProject() {
    window.parent.showPrompt("Enter Project Name:", (title) => {
        if(!title) return;
        db.projects.unshift({
            title: title,
            created: new Date().toISOString(),
            tasks: [],
            docs: [] 
        });
        saveDB();
        renderProjects();
    });
}



// 4. Open Project Panel
function openProjectPanel(idx) {
    curProjIdx = idx;
    curProjTab = 'task'; 
    projTaskFilter = 'all';
    isProjEdit = false;
    
    const p = db.projects[idx];
    document.getElementById('ppTitle').value = p.title;
    document.getElementById('projectPanel').classList.add('active');
    
    // Reset Filters UI
    document.querySelectorAll('#projFilters .f-chip').forEach(c => c.classList.remove('active'));
    document.querySelector('#projFilters .f-chip:first-child').classList.add('active');
    
    setProjectTab('task');
}

function closeProjectPanel() {
    document.getElementById('projectPanel').classList.remove('active');
    curProjIdx = null;
    renderProjects(); 
}

function updateProjectTitle(val) {
    if(curProjIdx === null) return;
    db.projects[curProjIdx].title = val;
    saveDB();
}



// 5. Tab & Filter Logic
function setProjectTab(tab) {
    curProjTab = tab;
    
    document.getElementById('ppTabTask').classList.toggle('active', tab === 'task');
    document.getElementById('ppTabDoc').classList.toggle('active', tab === 'doc');
    document.getElementById('projFilters').style.display = (tab === 'task') ? 'flex' : 'none';
    
    // Update FAB Icon
    document.getElementById('projFab').innerText = (tab === 'doc' && isProjEdit) ? '✓' : '+';
    
    renderProjectContent();
}

function setProjTaskFilter(filter, el) {
    projTaskFilter = filter;
    document.querySelectorAll('#projFilters .f-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderProjectContent();
}

// 1. Helper: Toggle View Mode
function toggleProjDocView() {
    isProjDocCardView = !isProjDocCardView;
    renderProjectContent();
}

// 2. Helper: Handle Search
function handleProjSearch(val) {
    projDocSearchQuery = val.toLowerCase().trim();
    renderProjectContent();
}

// 3. MAIN RENDER FUNCTION
// 3. MAIN RENDER FUNCTION (UPDATED FOR SCROLL FIX)
function renderProjectContent() {
    const box = document.getElementById('projectBody');
    const p = db.projects[curProjIdx];
    box.innerHTML = '';

    // --- A. EDIT MODE (FULL SCREEN ADVANCED EDITOR) ---
    if(isProjEdit && curProjTab === 'doc') {
        if(projFab) projFab.style.setProperty('display', 'none', 'important'); 

        box.innerHTML = `
        <div class="proj-editor-wrapper">
            <div id="projQuill"></div>
        </div>
        <div style="padding:10px 16px; background:#fff; border-top:1px solid var(--border); display:flex; gap:10px; position:fixed; bottom:0; left:0; right:0; z-index:100;">
            <button onclick="saveProjDoc()" style="flex:1; background:var(--primary); color:#fff; padding:12px; border:none; border-radius:10px; font-weight:800; font-size:1rem;">SAVE DOCUMENT</button>
            <button onclick="cancelProjEdit()" style="width:100px; background:#f1f5f9; color:var(--text-main); border:none; border-radius:10px; font-weight:700;">Cancel</button>
        </div>`;
        
        quill = new Quill('#projQuill', {
            theme: 'snow',
            placeholder: 'Type something amazing...',
            modules: {
                toolbar: [
                    [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'header': 1 }, { 'header': 2 }, 'blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image', 'video', 'formula'],
                    ['clean']
                ]
            }
        });

        if(editingProjDocIdx !== null && p.docs[editingProjDocIdx]) {
            quill.clipboard.dangerouslyPasteHTML(0, p.docs[editingProjDocIdx].html);
        }
        return;
    }

    // --- B. TASK VIEW ---
    if(curProjTab === 'task') {
        let tasks = p.tasks.map((t, i) => ({...t, oIdx: i}));
        if(projTaskFilter !== 'all') {
            if(projTaskFilter === 'pending') tasks = tasks.filter(t => t.status === 'pending');
            else tasks = tasks.filter(t => t.status === projTaskFilter);
        }
        if(!tasks.length) {
            box.innerHTML = `<div style="text-align:center; margin-top:50px; color:var(--text-sub);">No ${projTaskFilter} tasks.</div>`;
            return;
        }
        tasks.forEach(t => {
            const isDone = t.status === 'done';
            const isSkip = t.status === 'skip';
            box.innerHTML += `
            <div class="card ${t.status}" style="border-left: 4px solid ${isDone?'var(--success)':(isSkip?'var(--skip)':'var(--primary)')};">
                <div class="card-check" onclick="toggleProjTask(${t.oIdx})" style="background:${isDone?'var(--success)':'transparent'}; border-color:${isDone?'var(--success)':'var(--border)'}">
                     ${isDone ? '<svg style="width:14px;fill:white"><use href="#icon-check"/></svg>' : ''}
                </div>
                <div class="card-content">

		    <textarea class="inp-flat" rows="1" style="background:transparent; border:none; padding:0; font-weight:700; font-size:0.95rem; color:var(--text-main); width:100%; line-height: 1.4;" placeholder="Task Title" oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';" onchange="updProjTask(${t.oIdx}, 'txt', this.value)">${t.txt}</textarea>

		    <textarea class="proj-desc-inp" rows="1" placeholder="Add description..." oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px';" onchange="updProjTask(${t.oIdx}, 'desc', this.value)">${t.desc || ''}</textarea>



                </div>
                <div style="display:flex; flex-direction:column; gap:2px;">
                     <button onclick="skipProjTask(${t.oIdx})" style="font-size:0.6rem; padding:4px 8px; border-radius:4px; background:#f1f5f9; border:none; color:var(--text-sub); font-weight:700;">${isSkip?'RESET':'SKIP'}</button>
                     <button onclick="delProjItem('task', ${t.oIdx})" style="color:var(--danger); background:none; border:none; font-size:1.2rem; line-height:1;">×</button>
                </div>
            </div>`;
        });
    } 
    
    // --- C. ADVANCED DOCS VIEW (SCROLL FIXED) ---
    else {
        const controls = `
        <div class="proj-controls">
            <input type="text" class="proj-search-inp" placeholder="Search docs..." value="${projDocSearchQuery}" oninput="handleProjSearch(this.value)">
            <button class="proj-view-btn" onclick="toggleProjDocView()">
                ${isProjDocCardView ? 
                  '<svg style="width:18px;height:18px;fill:currentColor"><use href="#icon-layer"/></svg>' : 
                  '<svg style="width:18px;height:18px;fill:currentColor"><use href="#icon-full"/></svg>'
                }
            </button>
        </div>`;
        box.innerHTML = controls;

        let docs = p.docs.map((d, i) => ({...d, oIdx: i}));
        if(projDocSearchQuery) {
            docs = docs.filter(d => d.html.toLowerCase().includes(projDocSearchQuery));
        }

        const pinnedDocs = docs.filter(d => d.isPinned);
        const otherDocs = docs.filter(d => !d.isPinned);

        if(!docs.length) {
            box.innerHTML += `<div style="text-align:center; margin-top:50px; color:var(--text-sub);"><div style="font-size:2rem;">📂</div>No documents found.</div>`;
            return;
        }

        // --- SCROLL FIX HERE ---
        // overflow-y: auto ব্যবহার করা হয়েছে
        const renderDocCard = (d) => `
            <div class="sticker" style="background:${d.bg || '#fff'}; border:${d.isPinned ? '2px solid #f59e0b' : '1px solid var(--border)'}; box-shadow:${d.isPinned ? '0 4px 15px rgba(245, 158, 11, 0.2)' : 'var(--shadow-card)'}">
                <div class="sticker-actions" style="background:rgba(255,255,255,0.9);">
                    <button class="st-btn" onclick="toggleProjPin(${d.oIdx})" style="color:${d.isPinned?'#f59e0b':'var(--text-sub)'}">${d.isPinned ? '📌' : '📍'}</button>
                    <button class="st-btn edit" onclick="startProjEdit(${d.oIdx})">✎</button>
                    <button class="st-btn del" onclick="delProjItem('doc', ${d.oIdx})">×</button>
                </div>
                
                <div class="ql-editor" style="padding:0; max-height:${isProjDocCardView ? 'none' : '200px'}; overflow-y:${isProjDocCardView ? 'visible' : 'auto'};">
                    ${highlight(d.html, projDocSearchQuery)}
                </div>

                <div class="meta-info" style="margin-top:8px; padding-top:5px; border-top:1px solid rgba(0,0,0,0.05); text-align:right;">
                    ${d.created ? new Date(d.created).toLocaleDateString() : ''}
                </div>
            </div>`;

        const gridClass = isProjDocCardView ? 'proj-doc-list' : 'sticker-grid';
        let htmlContent = `<div style="padding: 0 16px 80px 16px;">`; 

        if(pinnedDocs.length > 0) {
            htmlContent += `
            <div class="pinned-header" style="margin-top:10px;">
                <div class="pin-label">📌 PINNED DOCS</div>
                <div class="${gridClass}">
                    ${pinnedDocs.map(renderDocCard).join('')}
                </div>
            </div>`;
        }

        if(otherDocs.length > 0) {
            htmlContent += `
            <div style="margin-top:15px;">
                <div class="group-label">ALL FILES (${otherDocs.length})</div>
                <div class="${gridClass}">
                    ${otherDocs.map(renderDocCard).join('')}
                </div>
            </div>`;
        }
        
        htmlContent += `</div>`;
        box.innerHTML += htmlContent;
    }

autoResizeAll();

}









// 4. Start Edit (UI Fix)
function startProjEdit(idx) {
    isProjEdit = true;
    editingProjDocIdx = idx;
    // FAB আইকন পরিবর্তন
    const fab = document.getElementById('projFab');
    if(fab) fab.innerText = '✓'; // অথবা 'Save'
    
    // এডিটর মোড অন হলে বডি স্ক্রল টপে নেওয়া
    document.getElementById('projectBody').scrollTop = 0;
    
    renderProjectContent();
}

// 5. Save Function (Validation Fix)


// saveProjDoc এর ভেতরে
function saveProjDoc() {
    if(!quill) return;
    const html = quill.root.innerHTML;
    const txt = quill.getText().trim();
    const hasContent = txt.length > 0 || html.includes('<img') || html.includes('<iframe') || html.includes('katex');

    if(!hasContent) {
        window.parent.showAlert("Empty Document", "Please write something before saving!");
        return;
    }


    const p = db.projects[curProjIdx];
    const now = new Date().toISOString();

    if(editingProjDocIdx !== null) {
        p.docs[editingProjDocIdx].html = html;
        p.docs[editingProjDocIdx].updated = now; // আপডেট টাইমস্ট্যাম্প
    } else {
        p.docs.unshift({ 
            html: html, 
            bg: getRandomColor(),
            isPinned: false,
            created: now,
            updated: now
        });
    }
    saveDB();
    cancelProjEdit();
}




// 7. Data Manipulation Functions
function addProjectItem() {
    if(curProjTab === 'task') {
        db.projects[curProjIdx].tasks.push({ 
            txt: '', desc: '', status: 'pending' 
        });
        saveDB();
        renderProjectContent();
    } else {
        startProjEdit(null); // Open Editor for new doc
    }
}

function updProjTask(idx, field, val) {
    db.projects[curProjIdx].tasks[idx][field] = val;
    saveDB();
}

function toggleProjTask(idx) {
    const t = db.projects[curProjIdx].tasks[idx];
    t.status = t.status === 'done' ? 'pending' : 'done';
    saveDB();
    renderProjectContent();
}

function skipProjTask(idx) {
    const t = db.projects[curProjIdx].tasks[idx];
    t.status = t.status === 'skip' ? 'pending' : 'skip';
    saveDB();
    renderProjectContent();
}

// 8. Doc Logic (Pinning & Editing)
function toggleProjPin(idx) {
    const d = db.projects[curProjIdx].docs[idx];
    d.isPinned = !d.isPinned;
    saveDB();
    renderProjectContent();
}





function cancelProjEdit() {
    isProjEdit = false;
    editingProjDocIdx = null;
    
    // বাটন আবার দেখান
    const projFab = document.getElementById('projFab');
    if(projFab) projFab.style.setProperty('display', 'flex', 'important');
    if(projFab) projFab.innerText = '+';
    
    renderProjectContent();
}



// ১. মাস্টার আইটেম ডিলিট
function deleteMasterItem(key, type, idx) {
    window.parent.showConfirm("Delete Item?", "Are you sure? This will permanently remove the item.", () => {
        db[key][type].splice(idx, 1);
        triggerDBSave();
        renderMasterContent();
    });
}

// ২. পুরো প্রজেক্ট ডিলিট
function deleteCurrentProject() {
    window.parent.showConfirm("Delete Project?", "Delete this entire project? This action is irreversible!", () => {
        db.projects.splice(curProjIdx, 1);
        saveDB();
        closeProjectPanel();
    });
}

// ৩. প্রজেক্টের ভেতরের আইটেম (Task/Doc) ডিলিট
function delProjItem(type, idx) {
    window.parent.showConfirm("Remove Item?", "Are you sure you want to remove this item?", () => {
        const p = db.projects[curProjIdx];
        if(type === 'task') p.tasks.splice(idx, 1);
        else p.docs.splice(idx, 1);
        saveDB();
        renderProjectContent();
    });
}
